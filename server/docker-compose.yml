services:
    postgres:
        image: postgres:15-alpine
        container_name: postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: api-pulse
            POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
        ports:
            - "5433:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
        networks:
            - api-pulse-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5    
    MongoDB:
        image: mongo:6.0
        container_name: api-pulse-mongodb
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
        networks:
            - api-pulse-network
        restart: unless-stopped
    RabbitMQ:
        image: rabbitmq:3-management-alpine
        container_name: api-pulse-rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
            RABBITMQ_DEFAULT_VHOST: api-pulse    
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - api-pulse-network
        restart: unless-stopped 
        healthcheck:
            test: ["CMD-SHELL", "rabbitmqctl status || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5           
    PgAdmin:
        image: dpage/pgadmin4:7.0
        container_name: api-pulse-pgadmin
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "8080:80"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        networks:
            - api-pulse-network
        restart: unless-stopped
        depends_on:
            - postgres
volumes:
        postgres_data:
                driver: local
        mongo_data: 
                driver: local
        rabbitmq_data:
                driver: local
        pgadmin_data:
                driver: local   
networks:
        api-pulse-network:
                driver: bridge    